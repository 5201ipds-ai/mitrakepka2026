<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Data Sobat</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <h1>ADMIN DATA SOBAT</h1>

  <a href="index.html" class="btn-admin">
    KEMBALI KE DATA PUBLIK
  </a>

  <div id="loginBox">

    <h2>Login Admin</h2>

    <input
      type="text"
      id="usernameAdmin"
      placeholder="Username"
    >

    <input
      type="password"
      id="passwordAdmin"
      placeholder="Password"
    >

    <button onclick="loginAdmin()">
      LOGIN
    </button>

    <p id="loginInfo"></p>

  </div>

  <div id="adminBox" style="display: none;">

    <button onclick="logoutAdmin()">
      LOGOUT
    </button>

<div class="filter-box">

  <input
    type="text"
    id="searchAdmin"
    placeholder="Cari nama..."
  >

  <select id="filterKecamatanAdmin">
    <option value="">Semua Kecamatan</option>
  </select>

  <select id="pageSizeAdmin">
    <option value="10">10 data</option>
    <option value="25">25 data</option>
    <option value="50">50 data</option>
    <option value="100">100 data</option>
  </select>

</div>
    
    <table>
<thead>
  <tr>
    <th onclick="sortKolomAdmin('sobatId')">SobatID ⬍</th>
    <th onclick="sortKolomAdmin('nama')">Nama ⬍</th>
    <th onclick="sortKolomAdmin('kecamatan')">Kecamatan ⬍</th>
    <th onclick="sortKolomAdmin('email')">Email ⬍</th>
    <th onclick="sortKolomAdmin('hp')">Nomor HP ⬍</th>
  </tr>
</thead>

      <tbody id="adminBody">
        <tr>
          <td data-label="Status" colspan="5">
            Data admin belum dimuat
          </td>
        </tr>
      </tbody>
    </table>

<div class="pagination">
  <button id="prevPageAdmin">Sebelumnya</button>

  <span id="pageInfoAdmin">
    Halaman 1
  </span>

  <button id="nextPageAdmin">Berikutnya</button>
</div>
    
  </div>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/admin.js"></script>

</body>
</html>
