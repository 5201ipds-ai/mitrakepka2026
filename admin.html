<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <title>Admin Data Sobat</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <h1>ADMIN DATA SOBAT</h1>

  <a href="index.html" class="btn-admin">
    KEMBALI KE DATA PUBLIK
  </a>

  <div id="loginBox">

    <h2>Login Admin</h2>

    <input
      type="text"
      id="usernameAdmin"
      placeholder="Username"
    >

    <input
      type="password"
      id="passwordAdmin"
      placeholder="Password"
    >

    <button onclick="loginAdmin()">
      LOGIN
    </button>

    <p id="loginInfo"></p>

  </div>

  <div id="adminBox" style="display: none;">

    <button onclick="logoutAdmin()">
      LOGOUT
    </button>

    <table>
      <thead>
        <tr>
          <th>SobatID</th>
          <th>Nama</th>
          <th>Kecamatan</th>
          <th>Email</th>
          <th>Nomor HP</th>
        </tr>
      </thead>

      <tbody id="adminBody">
        <tr>
          <td colspan="5">
            Data admin belum dimuat
          </td>
        </tr>
      </tbody>
    </table>

  </div>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/admin.js"></script>

</body>
</html>
