<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">

  <title>Data Sobat</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- JUDUL -->
  <h1>DATA SOBAT</h1>

  <!-- TOMBOL LOGIN ADMIN -->
  <a href="admin.html" class="btn-admin">
    LOGIN ADMIN
  </a>
<div class="filter-box">

  <input
    type="text"
    id="searchInput"
    placeholder="Cari nama..."
  >

  <select id="filterKecamatan">
    <option value="">Semua Kecamatan</option>
  </select>

  <select id="pageSize">
    <option value="10">10 data</option>
    <option value="25">25 data</option>
    <option value="50">50 data</option>
    <option value="100">100 data</option>
  </select>

</div>
  <!-- TABEL -->
  <table>

    <!-- KEPALA TABEL -->
<thead>
  <tr>
    <th onclick="sortKolom('sobatId')">SobatID ⬍</th>
    <th onclick="sortKolom('nama')">Nama ⬍</th>
    <th onclick="sortKolom('kecamatan')">Kecamatan ⬍</th>
    <th onclick="sortKolom('email')">Email ⬍</th>
    <th onclick="sortKolom('hp')">Nomor HP ⬍</th>
  </tr>
</thead>

    <!-- ISI TABEL -->
    <tbody id="dataBody">

      <!-- LOADING -->
      <tr>
        <td colspan="5">
          Memuat data...
        </td>
      </tr>

    </tbody>

  </table>
<div class="pagination">
  <button id="prevPage">Sebelumnya</button>

  <span id="pageInfo">
    Halaman 1
  </span>

  <button id="nextPage">Berikutnya</button>
</div>
  <!-- CONFIG -->
  <script src="js/config.js"></script>

  <!-- FUNGSI BANTU -->
  <script src="js/utils.js"></script>

  <!-- KHUSUS HALAMAN PUBLIK -->
  <script src="js/public.js"></script>

</body>
</html>
